syntax = "proto3";

option csharp_namespace = "ProductGrpc";

package product;

service ProductProtoService {
  rpc ReserveProducts (ReserveProductsRequest) returns (ReserveProductsResponse);
}

message ReserveProductsRequest {
  repeated OrderItem items = 1;
}

message OrderItem {
  string product_id = 1;
  int32 quantity = 2;
}

message ReserveProductsResponse {
  repeated ReservedProduct products = 1;
}

message ReservedProduct {
  string product_id = 1;
  int64 price = 2;
}